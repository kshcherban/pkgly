# ABOUTME: Kubernetes Deployment for Pkgly application.
# ABOUTME: Configures container, environment variables, volumes, and health probes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pkgly-chart.fullname" . }}
  labels:
    {{- include "pkgly-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pkgly-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "pkgly-chart.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pkgly-chart.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["start", "--config", "/data/config.toml"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            {{- if .Values.postgresql.enabled }}
            - name: PKGLY_DATABASE_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: PKGLY_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-postgresql" (include "pkgly-chart.fullname" .)) .Values.postgresql.auth.existingSecret }}
                  key: password
            - name: PKGLY_DATABASE_DATABASE
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: PKGLY_DATABASE_HOST
              value: "{{ include "pkgly-chart.fullname" . }}-postgresql"
            - name: PKGLY_DATABASE_PORT
              value: "5432"
            {{- else if and (not .Values.postgresql.enabled) .Values.externalDatabase.secretRef.enabled }}
            - name: PKGLY_DATABASE_USER
              value: {{ .Values.externalDatabase.user | quote }}
            - name: PKGLY_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.secretRef.name }}
                  key: {{ .Values.externalDatabase.secretRef.passwordKey }}
            - name: PKGLY_DATABASE_DATABASE
              value: {{ .Values.externalDatabase.database | quote }}
            - name: PKGLY_DATABASE_HOST
              value: {{ .Values.externalDatabase.host | quote }}
            - name: PKGLY_DATABASE_PORT
              value: {{ .Values.externalDatabase.port | quote }}
            {{- end }}
            # S3 credentials from secret (when using S3 with secretRef)
            {{- if and .Values.s3Storage.enabled .Values.s3Storage.secretRef.enabled (not .Values.s3Storage.useIamRole) }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3Storage.secretRef.name }}
                  key: accessKeyId
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3Storage.secretRef.name }}
                  key: secretAccessKey
            {{- end }}
            # Custom environment variables
            {{- range .Values.env }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /data/config.toml
              subPath: config.toml
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "pkgly-chart.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pkgly-chart.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
