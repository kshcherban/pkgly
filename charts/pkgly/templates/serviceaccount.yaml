# ABOUTME: Kubernetes ServiceAccount for the Pkgly pod.
# ABOUTME: Only created when serviceAccount.create is true; honors name/annotations/automount.
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pkgly-chart.serviceAccountName" . }}
  labels:
    {{- include "pkgly-chart.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
