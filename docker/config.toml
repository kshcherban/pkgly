  # email_header = "CF-Access-Authenticated-User-Email"
  # display_name_header = "CF-Access-Authenticated-User-Name"
  # auto_create_users = true


[log.levels]
default = "Info"
[log.levels.others]
"pkgly" = "Info"
"nr_core" = "Info"
"nr_storage" = "Info"
"sqlx" = "Info"
"pg_extended_sqlx_queries" = "Info"
"h2" = "Info"
"tower" = "Info"
"tonic" = "Info"
"hyper_util" = "Info"
